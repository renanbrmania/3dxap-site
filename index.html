<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3DXAP | Impressão 3D</title>

  <!-- FAVICON -->
  <link rel="icon" href="logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff8fb;
      color: #333;
    }

    header {
      background: linear-gradient(90deg, #f8a5c2, #a8e6b0);
      padding: 20px;
      text-align: center;
    }

    header img {
      height: 120px; /* LOGO MAIOR */
    }

    .container {
      padding: 30px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      color: #d66a95;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
      text-align: center;
    }

    .emoji {
      font-size: 60px;
    }

    .btn {
      display: block;
      margin-top: 10px;
      background: #7bcf9a;
      color: white;
      padding: 10px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }

    /* BOTÃO FLUTUANTE */
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      text-decoration: none;
      z-index: 1000;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
    }

    /* INSTAGRAM */
    .instagram {
      margin-top: 40px;
      text-align: center;
    }

    .insta-box {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background: #ffe4ef;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" alt="3DXAP Logo">
</header>

<div class="container">
  <h2>Produtos</h2>

  <div class="grid">

    <div class="card">
      <div class="emoji">🪴</div>
      <h3>Vaso Decorativo</h3>
      <p>R$ 39,90</p>
      <a class="btn" href="https://wa.me/5549991167161?text=Quero%20o%20vaso">Pedir</a>
    </div>

    <div class="card">
      <div class="emoji">🤖</div>
      <h3>Bonequinho 3D</h3>
      <p>R$ 29,90</p>
      <a class="btn" href="https://wa.me/5549991167161?text=Quero%20o%20bonequinho">Pedir</a>
    </div>

    <div class="card">
      <div class="emoji">🎧</div>
      <h3>Suporte Headset</h3>
      <p>R$ 34,90</p>
      <a class="btn" href="https://wa.me/5549991167161?text=Quero%20o%20suporte">Pedir</a>
    </div>

  </div>

  <!-- INSTAGRAM -->
  <div class="instagram">
    <h2>Nosso Instagram</h2>
    <div class="insta-box">
      <p>Siga a 3DXAP para ver novidades, peças novas e projetos personalizados 👇</p>
      <a class="btn" href="https://www.instagram.com/paulacristina.pacheco/" target="_blank">Ver Instagram</a>
    </div>
  </div>

</div>

<footer>
  WhatsApp: (49) 99116-7161<br>
  3DXAP © 2026
</footer>

<!-- BOTÃO FLUTUANTE -->
<a class="whatsapp-float" href="https://wa.me/5549991167161" target="_blank">
  💬
</a>

</body>
</html>
